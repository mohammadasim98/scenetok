data_loader:
  train:
    name: train
    shuffle: true
    batch_size: 1
    max_batches: -1
    num_workers: 4
    seed: null
    interval: null  
    persistent_workers: true
  test:
    name: test
    shuffle: true
    batch_size: 1
    max_batches: -1
    num_workers: 4
    seed: 0
    interval: null  
    persistent_workers: false
  val:
    standard:
      name: val
      shuffle: true
      batch_size: 1
      max_batches: -1
      num_workers: 4
      seed: null
      interval: 2500  
      persistent_workers: false
      
    evaluate:
      name: val
      shuffle: false
      batch_size: 16
      max_batches: -1
      num_workers: 4
      seed: 0
      interval: 25000  
      persistent_workers: false


index_generator:

  output_file: assets/evaluation_index/dl3dv_c16_34.json
  seed: 0
  num_context_views: 16
  num_target_view_min: 34
