# @package _global_

defaults:
  - override /dataset: latent_re10k
  - override /dataset/view_sampler: unbounded
  - override /model/scheduler: rf
  - override /model/denoiser: lightningdit_L_1
  - override /model/autoencoders/context: va
  - override /model/autoencoders/target: video_dc
  - override /model/compressor: mv_B1
  - override /model/compressor/camera: ray
  - override /model/compressor/camera/embedding: lvsm
  - override /model/denoiser/camera: ray
  - override /model/denoiser/camera/embedding: lvsm

dataset:
  context_root: "dataset/re10k_vavae_latents"
  target_root: "dataset/re10k_videodc_latents" 
  map_dict: dataset/re10k_vavae_latents/map_dict.json




data_loader:
  train:
    batch_size: 32


wandb:
  tags: [re10k, 256x256]

  activated: true

sampler:
  clean_targets: 4

model:

  cfg_scale: 1.0
  cfg_train: true

  scheduler:
    sampling_type: random_chunked_uniform
    num_inference_steps: 25
    kwargs:
      weighting: logit_normal
      num_chunks: 2
  
  denoiser:
    input_shape: [8, 8]
    load_strict: false # Backward compatibility: only for provided checkpoints
    gradient_checkpointing: false
    num_target_split: 1
    camera:
      input_shape: [128, 128]
      embedding:
        patch_size: 16
        in_channels: 24
    kwargs:
      use_rope_3d: true
      in_channels: 128

  compressor:
    load_strict: false # Backward compatibility: only for provided checkpoints
    freeze_after: 150000 # Afterwards finetune the decoder only
    kl_weights: [1e-10, 1e-10] # Adds a small reglurization for stabilizing the token space (Only for RE10k)
    input_shape: [16, 16]
    num_scene_tokens: 512
    gradient_checkpointing: false
    token_dim: 64
    camera_conditioning: adaLN
    scene_token_projection: kl

    camera:
      input_shape: [128, 128]
      embedding:
        patch_size: 16
    kwargs:
      use_rope_2d: true
      use_rope_3d: false
      patch_size: 2
      
trainer:
  max_steps: 5_000_001
  val_check_interval: 5000
  task_steps: null
  accumulate_grad_batches: 1
  

  precision: bf16-mixed

optimizer:
  name: AdamW
  lr: 1.0e-4

  scale_lr: false
  milestones: [2000]
  scheduler:
    - name: LinearLR
      frequency: 1
      interval: step
      kwargs:
        start_factor: 5.e-4
        total_iters: 2000

    - name: MultiStepLR
      frequency: 1
      interval: step
      kwargs:
        milestones: [20000, 150000, 500000]
        gamma: 0.4
