# @package _global_

defaults:
  - override /dataset: latent_dl3dv
  - override /dataset/view_sampler: bounded
  - override /model/scheduler: rf
  - override /model/denoiser: lightningdit_L_1
  - override /model/autoencoders/context: va
  - override /model/autoencoders/target: wan
  - override /model/compressor: mv_B1
  - override /model/compressor/camera: ray
  - override /model/compressor/camera/embedding: lvsm
  - override /model/denoiser/camera: ray
  - override /model/denoiser/camera/embedding: lvsm

dataset:
  context_root: "dataset/dl3dv_vavae_latents"
  target_root: "dataset/dl3dv_wan_latents" 
  map_dict: dataset/dl3dv_vavae_latents/map_dict.json

  # NOTE: Allow compatibility with va-wan, refer to docs/KNOWN_BUG.md
  scale_context_focal_by_256: true

  view_sampler:
    num_target_split: 2
    num_target_views: 10
    chunk_index_gap: 5
    offset: 1

data_loader:
  train:
    batch_size: 4
  val:
    standard:
      batch_size: 16
val:
  video_length: 68
  window_shift: 5
wandb:
  tags: [re10k, 256x256]

  activated: true
sampler:
  clean_targets: 5
  
freeze:
  denoiser: false
  compressor: true

model:
  
  force_incorrect: true # A known bug in va-wan, refer to docs/KNOWN_BUG.md 

  scheduler:
    sampling_type: random_chunked_uniform
    num_inference_steps: 25
    kwargs:
      weighting: shifted
      timestep_shift: 4
  denoiser:
    ckpt_path: checkpoints/va-videodc_dl3dv.ckpt
    load_strict: false # Backward compatibility: only for provided checkpoints
    input_shape: [16, 16]
    gradient_checkpointing: false
    num_target_split: 2 # Split 3D RoPE to be applied independently per chunk
    camera:
      input_shape: [128, 128]
      embedding:
        patch_size: 8
        in_channels: 24
    kwargs:
      use_rope_3d: true
      in_channels: 48

  compressor:
    ckpt_path: checkpoints/va-videodc_dl3dv.ckpt
    load_strict: false # Backward compatibility: only for provided checkpoints

    kl_weights: [0.0, 0.0]
    input_shape: [16, 16]
    num_scene_tokens: 1024
    causal_self_atten: false
    gradient_checkpointing: false
    token_dim: 64
    init_large: true
    camera_conditioning: adaLN
    scene_token_projection: kl
    mask_context: false
    camera:
      input_shape: [128, 128]
      embedding:
        patch_size: 16
    kwargs:
      use_rope_2d: true
      use_rope_3d: false
      patch_size: 2

        
trainer:
  max_steps: 5_000_001
  val_check_interval: 5000
  task_steps: null
  accumulate_grad_batches: 1
  gradient_clip_val: 0.1

  precision: bf16-mixed

optimizer:
  name: AdamW
  lr: 1.0e-5

  scale_lr: false
  milestones: [2000]
  scheduler:
    - name: LinearLR
      frequency: 1
      interval: step
      kwargs:
        start_factor: 5.e-4
        total_iters: 2000

    - name: MultiStepLR
      frequency: 1
      interval: step
      kwargs:
        milestones: [500000]
        gamma: 0.8
